<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020317" />
      <stop offset="100%" stop-color="#0a1420" />
    </linearGradient>
    <linearGradient id="og-accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#0ee7ff" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#og-accent)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#og-accent)"/>
  <!-- Logo/text area -->
  <circle cx="150" cy="150" r="80" fill="none" stroke="#0ee7ff" stroke-width="3" opacity="0.7"/>
  <circle cx="150" cy="150" r="50" fill="#0ee7ff" opacity="0.3"/>
  <circle cx="150" cy="150" r="10" fill="#0ee7ff"/>
  <!-- Heading -->
  <text x="400" y="120" font-family="Space Grotesk, sans-serif" font-size="72" font-weight="700" fill="url(#og-accent)">Qentra.cloud</text>
  <text x="400" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="600" fill="#0ee7ff">AI Automation & Cloud Engineering</text>
  <!-- Subheading -->
  <text x="400" y="280" font-family="Inter, sans-serif" font-size="32" fill="#ffffff" opacity="0.8">Enterprise-grade solutions for modern businesses</text>
  <!-- Icons row -->
  <circle cx="450" cy="400" r="30" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="400" r="30" fill="none" stroke="#0ee7ff" stroke-width="2" opacity="0.6"/>
  <circle cx="750" cy="400" r="30" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <text x="440" y="410" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0ee7ff">AI</text>
  <text x="580" y="410" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#7c3aed">K8s</text>
  <text x="735" y="410" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0ee7ff">Cloud</text>
</svg>
