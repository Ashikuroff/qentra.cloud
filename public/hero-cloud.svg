<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="cloud-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030817" />
      <stop offset="100%" stop-color="#071023" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#cloud-bg)"/>
  <!-- Kubernetes-style cluster circles -->
  <circle cx="200" cy="150" r="35" fill="none" stroke="#0ee7ff" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="150" r="8" fill="#0ee7ff" opacity="0.8"/>
  
  <circle cx="350" cy="250" r="40" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.4"/>
  <circle cx="350" cy="250" r="8" fill="#7c3aed" opacity="0.8"/>
  
  <circle cx="600" cy="200" r="45" fill="none" stroke="#0ee7ff" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="200" r="8" fill="#0ee7ff" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="220" y1="160" x2="330" y2="240" stroke="#0ee7ff" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="260" x2="580" y2="210" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  
  <!-- Platform lines -->
  <line x1="100" y1="450" x2="700" y2="450" stroke="#0ee7ff" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="480" x2="700" y2="480" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
</svg>
