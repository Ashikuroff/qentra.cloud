<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="sec-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050710" />
      <stop offset="100%" stop-color="#0a1420" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sec-bg)"/>
  <!-- Security shield grid -->
  <g opacity="0.5">
    <rect x="300" y="100" width="200" height="200" fill="none" stroke="#0ee7ff" stroke-width="1"/>
    <rect x="310" y="110" width="180" height="180" fill="none" stroke="#0ee7ff" stroke-width="1" opacity="0.6"/>
    <line x1="400" y1="100" x2="400" y2="300" stroke="#0ee7ff" stroke-width="1" opacity="0.4"/>
    <line x1="300" y1="200" x2="500" y2="200" stroke="#0ee7ff" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Lock icons -->
  <g opacity="0.7">
    <circle cx="600" cy="150" r="25" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <rect x="590" y="165" width="20" height="15" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <!-- Threat detection lines -->
  <line x1="100" y1="400" x2="300" y2="450" stroke="#0ee7ff" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="450" x2="500" y2="420" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="420" x2="700" y2="470" stroke="#0ee7ff" stroke-width="1" opacity="0.3"/>
  <!-- Status dots -->
  <circle cx="150" cy="450" r="4" fill="#0ee7ff" opacity="0.6"/>
  <circle cx="350" cy="450" r="4" fill="#7c3aed" opacity="0.6"/>
  <circle cx="550" cy="420" r="4" fill="#0ee7ff" opacity="0.6"/>
</svg>
